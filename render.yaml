services:
  - type: web
    name: MovFoo
    env: node
    region: oregon
    plan: starter
    branch: main       # or master, whichever your default is
    rootDir: backend   # IMPORTANT: tells Render to run inside backend/
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: SUPABASE_URL
        fromEnvVar: SUPABASE_URL
      - key: SUPABASE_SERVICE_ROLE_KEY
        fromEnvVar: SUPABASE_SERVICE_ROLE_KEY
      - key: TMDB_API_KEY
        fromEnvVar: TMDB_API_KEY

